<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人臨床藥學工具集 — 梁哲嘉藥師</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #F5F0E8;
      --bg-card: #FFFFFF;
      --accent: #3D7A8A;
      --accent-hover: #2E6B7A;
      --accent-light: rgba(61,122,138,0.08);
      --text-primary: #2C2C2C;
      --text-muted: #6B7280;
      --border: #E0D9CE;
      --danger: #C0392B;
      --success: #27AE60;
      --warning: #E67E22;
      --radius-card: 8px;
      --radius-input: 4px;
      --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      padding: 2.5rem 1rem 1rem;
    }
    .site-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .site-header .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 480px;
      margin: 1.25rem auto 0.5rem;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      font-size: 0.95rem;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-card);
      transition: var(--transition);
      min-height: 44px;
    }
    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* ── Category Filter ── */
    .category-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.75rem 1rem;
    }
    .cat-btn {
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg-card);
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      user-select: none;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Grid ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      padding: 0 1rem 2rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .tool-card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: var(--transition);
      border: 1px solid transparent;
    }
    .tool-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .tool-card .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .tool-card .name-zh {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
    }
    .tool-card .name-en {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .tool-card .desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }
    .tool-card .card-footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    /* ── Badges ── */
    .badge-platform {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
    }
    .badge-platform.gh {
      background: #dafbe1;
      color: #1a7f37;
    }
    .badge-platform.gas {
      background: #fff3cd;
      color: #856404;
    }
    .badge-status-maintenance {
      background: #fde8e8;
      color: var(--danger);
    }

    /* ── Links ── */
    .card-links {
      display: flex;
      gap: 0.5rem;
    }
    .card-links a {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      padding: 0.2rem 0.5rem;
      border-radius: var(--radius-input);
      transition: var(--transition);
      min-height: 32px;
      display: inline-flex;
      align-items: center;
    }
    .card-links a:hover {
      background: var(--accent-light);
      color: var(--accent-hover);
    }

    /* ── Tag chips ── */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .tag-chip {
      font-size: 0.62rem;
      padding: 0.1rem 0.4rem;
      border-radius: 8px;
      background: var(--accent-light);
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    /* ── Version badge ── */
    .version-badge {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 0.65rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      background: rgba(245,240,232,0.9);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 0.25rem;
    }
    .stats-bar strong {
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .site-header h1 { font-size: 1.3rem; }
      .tools-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; transform: none !important; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <h1>個人臨床藥學工具集</h1>
    <p class="subtitle">梁哲嘉藥師 ── Clinical Pharmacy Toolkit</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜尋工具名稱、標籤…" autocomplete="off">
    </div>
  </header>

  <nav class="category-bar" id="categoryBar">
    <!-- rendered by JS -->
  </nav>

  <div class="stats-bar" id="statsBar"></div>

  <main class="tools-grid" id="toolsGrid">
    <div class="loading">載入中…</div>
  </main>

  <div class="version-badge" id="versionBadge">v1.0.0 | 梁哲嘉藥師</div>

  <script>
  (function () {
    'use strict';

    let allTools = [];
    let categories = [];
    let activeCategory = 'all';

    const searchInput = document.getElementById('searchInput');
    const categoryBar = document.getElementById('categoryBar');
    const toolsGrid = document.getElementById('toolsGrid');
    const statsBar = document.getElementById('statsBar');
    const versionBadge = document.getElementById('versionBadge');

    // ── Fetch & Init ──
    fetch('tools.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed to load tools.json');
        return r.json();
      })
      .then(data => {
        allTools = data.tools;
        categories = data.categories;
        versionBadge.textContent = 'v1.0.0 | ' + (data.meta.subtitle || '梁哲嘉藥師');
        renderCategories();
        renderTools();
      })
      .catch(err => {
        toolsGrid.innerHTML = '<div class="empty-state">載入失敗：' + escapeHtml(err.message) + '</div>';
      });

    // ── Render categories ──
    function renderCategories() {
      let html = '';
      // "All" button via createElement to avoid XSS
      const allBtn = document.createElement('button');
      allBtn.className = 'cat-btn active';
      allBtn.dataset.cat = 'all';
      allBtn.textContent = '全部';
      categoryBar.appendChild(allBtn);

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.dataset.cat = cat.id;
        btn.textContent = cat.icon + ' ' + cat.label;
        categoryBar.appendChild(btn);
      });

      categoryBar.addEventListener('click', function (e) {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        activeCategory = btn.dataset.cat;
        categoryBar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTools();
      });
    }

    // ── Render tool cards ──
    function renderTools() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = allTools.filter(t => {
        const catMatch = activeCategory === 'all' || t.category === activeCategory;
        if (!catMatch) return false;
        if (!query) return true;
        const haystack = [t.name, t.nameZh, t.description, ...t.tags].join(' ').toLowerCase();
        return haystack.includes(query);
      });

      statsBar.innerHTML = '顯示 <strong>' + filtered.length + '</strong> / <strong>' + allTools.length + '</strong> 項工具';

      if (filtered.length === 0) {
        toolsGrid.innerHTML = '<div class="empty-state">找不到符合條件的工具</div>';
        return;
      }

      toolsGrid.innerHTML = '';
      filtered.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tool-card';

        // Platform badge
        const isGH = t.platform === 'github-pages';
        const badgeClass = isGH ? 'gh' : 'gas';
        const badgeText = isGH ? 'GitHub Pages' : 'GAS 院內';

        // Status badge
        let statusBadge = '';
        if (t.status === 'maintenance') {
          statusBadge = '<span class="badge-platform badge-status-maintenance">維護中</span> ';
        }

        // Links
        let linksHtml = '';
        if (t.url) {
          linksHtml += '<a href="' + escapeAttr(t.url) + '" target="_blank" rel="noopener">開啟工具 →</a>';
        }
        if (t.repo) {
          linksHtml += '<a href="' + escapeAttr(t.repo) + '" target="_blank" rel="noopener">GitHub</a>';
        }
        if (!t.url && !t.repo) {
          linksHtml = '<span style="font-size:0.75rem;color:var(--text-muted);">院內網路存取</span>';
        }

        // Tags
        const tagsHtml = t.tags.map(tag => '<span class="tag-chip">' + escapeHtml(tag) + '</span>').join('');

        card.innerHTML =
          '<div class="card-top">' +
            '<div>' +
              '<div class="name-zh">' + escapeHtml(t.nameZh) + '</div>' +
              '<div class="name-en">' + escapeHtml(t.name) + '</div>' +
            '</div>' +
            '<div>' + statusBadge + '<span class="badge-platform ' + badgeClass + '">' + badgeText + '</span></div>' +
          '</div>' +
          '<div class="desc">' + escapeHtml(t.description) + '</div>' +
          '<div class="tag-row">' + tagsHtml + '</div>' +
          '<div class="card-footer-row">' +
            '<div class="card-links">' + linksHtml + '</div>' +
          '</div>';

        toolsGrid.appendChild(card);
      });
    }

    // ── Search ──
    let debounceTimer;
    searchInput.addEventListener('input', function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderTools, 200);
    });

    // ── Escape helpers ──
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  })();
  </script>
</body>
</html>
